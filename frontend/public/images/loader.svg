<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .spinner {
      transform-origin: center;
      animation: spin 2s linear infinite;
    }
    .path {
      stroke-dasharray: 283;
      stroke-dashoffset: 280;
      animation: dash 1.5s ease-in-out infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    @keyframes dash {
      0% { stroke-dashoffset: 280; }
      50% { stroke-dashoffset: 70; }
      100% { stroke-dashoffset: 280; }
    }
  </style>
  <circle class="spinner" cx="50" cy="50" r="45" stroke="#FFDD00" stroke-width="2" stroke-opacity="0.1"/>
  <circle class="spinner path" cx="50" cy="50" r="45" stroke="#FFDD00" stroke-width="6" stroke-linecap="round"/>
  <path d="M40 50L48 58L62 44" stroke="#FFDD00" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
  </path>
</svg>
